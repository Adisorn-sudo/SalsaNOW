name: .NET

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: nuget restore SalsaNOW.sln

    - name: Build
      run: msbuild SalsaNOW.sln /p:Configuration=Release /p:SignManifests=false

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: SalsaNOW-build
        path: SalsaNOW/bin/Release/
    - name: Run program
      run: SalsaNOW/bin/Release/SalsaNOW.exe
